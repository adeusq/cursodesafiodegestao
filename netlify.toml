[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/hashtag"
  to = "/hashtag.html"
  status = 200

[[redirects]]
  from = "/liberdata"
  to = "/liberdata.html"
  status = 200

[[redirects]]
  from = "/suppri"
  to = "/suppri.html"
  status = 200
